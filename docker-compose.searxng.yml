services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: synthpost-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      SEARXNG_BASE_URL: http://127.0.0.1:8888/
      SEARXNG_SECRET: synthpost-local-only-change-if-exposed
    volumes:
      - ./config/searxng:/etc/searxng:rw
      - searxng-cache:/var/cache/searxng:rw

volumes:
  searxng-cache:
