<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050A14"/>
      <stop offset="0.55" stop-color="#071B33"/>
      <stop offset="1" stop-color="#050A14"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#5C7FA6" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.85"/>
  <rect x="76" y="74" width="1448" height="752" fill="#050A14" fill-opacity="0.42" stroke="#5C7FA6" stroke-opacity="0.7" stroke-width="2"/>
  <text x="120" y="144" font-size="32" fill="#FFD84A" font-family="Inter, Arial, sans-serif" font-weight="800">ENERGY</text>
  <text x="120" y="184" font-size="24" fill="#AAB4C2" font-family="Inter, Arial, sans-serif">FERC</text>
  <text x="1160" y="144" font-size="24" fill="#F5F7FA" fill-opacity="0.62" font-family="Inter, Arial, sans-serif" font-weight="700">SYNTHPOST CONTEXT</text>
  <line x1="120" y1="203" x2="540" y2="203" stroke="#1F7BFF" stroke-width="4"/>
  <text x="120" y="245" font-size="64" fill="#F5F7FA" font-family="Georgia, serif" font-weight="700">GRID OPERATORS FACE 30-DAY TARIFF</text>
<text x="120" y="323" font-size="64" fill="#F5F7FA" font-family="Georgia, serif" font-weight="700">DEADLINE</text>
  <line x1="120" y1="462" x2="980" y2="462" stroke="#5C7FA6" stroke-opacity="0.55" stroke-width="2"/>
  <text x="122" y="520" font-size="30" fill="#AAB4C2" font-family="Inter, Arial, sans-serif">FERC says standardized rules are intended to support grid</text>
<text x="122" y="562" font-size="30" fill="#AAB4C2" font-family="Inter, Arial, sans-serif">reliability, cost transparency, and consistent treatment</text>
<text x="122" y="604" font-size="30" fill="#AAB4C2" font-family="Inter, Arial, sans-serif">across regions. The Federal Energy Regulatory Commission</text>
<text x="122" y="646" font-size="30" fill="#AAB4C2" font-family="Inter, Arial, sans-serif">launched a fast-track proceeding on June 18 to standardize...</text>
  <rect x="120" y="642" width="120" height="52" rx="0" fill="#071B33" stroke="#1F7BFF" stroke-width="2"/><text x="137" y="676" font-size="22" fill="#F5F7FA" font-family="Inter, Arial, sans-serif">GRID</text><rect x="258" y="642" width="151" height="52" rx="0" fill="#071B33" stroke="#1F7BFF" stroke-width="2"/><text x="275" y="676" font-size="22" fill="#F5F7FA" font-family="Inter, Arial, sans-serif">OPERATORS</text><rect x="427" y="642" width="120" height="52" rx="0" fill="#071B33" stroke="#1F7BFF" stroke-width="2"/><text x="444" y="676" font-size="22" fill="#F5F7FA" font-family="Inter, Arial, sans-serif">FACE</text><rect x="565" y="642" width="120" height="52" rx="0" fill="#071B33" stroke="#1F7BFF" stroke-width="2"/><text x="582" y="676" font-size="22" fill="#F5F7FA" font-family="Inter, Arial, sans-serif">30-DAY</text><rect x="703" y="642" width="120" height="52" rx="0" fill="#071B33" stroke="#1F7BFF" stroke-width="2"/><text x="720" y="676" font-size="22" fill="#F5F7FA" font-family="Inter, Arial, sans-serif">TARIFF</text>
</svg>
