<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar Runtime</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #00ff00; }
      #avatar { display: block; position: absolute; inset: 0; width: 100%; height: 100%; }
      #status {
        position: fixed;
        bottom: 8px;
        left: 8px;
        font-family: monospace;
        font-size: 11px;
        color: #fff;
        background: rgba(0,0,0,0.5);
        padding: 2px 6px;
        border-radius: 3px;
        z-index: 999;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="avatar"></div>
    <div id="status">Loading...</div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
